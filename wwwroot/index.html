<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>AYO ABC</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

  <!-- Startskarm -->
  <div id="start-screen" class="screen active">
    <div class="start-bg">
      <img src="/images/ayo.jpg" alt="Ayo" class="start-photo" onerror="this.style.display='none'">
      <div class="start-overlay">
        <img src="/images/frontpage.png" alt="Ayo ABC" class="start-logo">
        <button class="btn-play" onclick="showParentScreen()">SPELA</button>
      </div>
    </div>
  </div>

  <!-- Foraldraskarm -->
  <div id="parent-screen" class="screen">
    <div class="parent-wrap">
      <button class="btn-home" onclick="showScreen('start-screen')">Hem</button>
      <div class="parent-header">
        <h2 class="parent-h2">Hej foralder!</h2>
        <p class="parent-sub">lista ord for barnet att ova:</p>
      </div>
      <input
        id="word-input"
        type="text"
        placeholder="skriv ett ord, tryck enter..."
        maxlength="30"
        autocomplete="off"
        autocorrect="off"
        autocapitalize="characters"
        spellcheck="false"
      >
      <ul id="word-list" class="word-list"></ul>
      <button class="btn-start-session" id="btn-starta" onclick="startSession()">
        Starta
      </button>
    </div>
  </div>

  <!-- Spelskarm -->
  <div id="game-screen" class="screen">
    <div class="game-top">
      <button class="btn-back" onclick="showParentScreen()">Tillbaka</button>
      <span class="word-counter" id="word-counter"></span>
      <div class="progress-track"><div id="progress-fill"></div></div>
    </div>
    <div id="word-display"></div>
    <div id="keyboard"></div>
  </div>

  <!-- Ord klarat -->
  <div id="word-done-screen" class="screen">
    <div class="big-star">Bra!</div>
    <p class="done-word-label" id="done-word-label"></p>
  </div>

  <!-- Alla ord klara -->
  <div id="final-screen" class="screen">
    <div class="cat-frame">
      <img src="/images/cat.gif" alt="Dansande katt" class="cat-gif" onerror="handleCatError(this)">
    </div>
    <div class="grattis">GRATTIS!!</div>
    <button class="btn-again" onclick="showScreen('start-screen')">Spela igen!</button>
  </div>

  <script src="/js/app.js"></script>
</body>
</html>
